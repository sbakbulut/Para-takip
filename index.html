<style>
:root{
  --bg:#07090f;--bg2:#0d1117;--bg3:#111827;
  --card:rgba(255,255,255,0.04);--card2:rgba(255,255,255,0.02);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.05);
  --txt:#f1f5f9;--sub:#64748b;--dim:#334155;
  --inp:rgba(0,0,0,0.3);
  --blue:#3b82f6;--blue2:#60a5fa;--blueglow:rgba(59,130,246,0.3);
  --green:#06ffa5;--greenglow:rgba(6,255,165,0.25);
  --red:#ff4466;--redglow:rgba(255,68,102,0.25);
  --purple:#a855f7;--purpleglow:rgba(168,85,247,0.25);
  --amber:#f59e0b;
  --radius:16px;--radius-sm:10px;--radius-xs:8px;
  --shadow:0 1px 20px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.04);
  --shadow-sm:0 1px 8px rgba(0,0,0,0.3);
  --font:'Space Grotesk',sans-serif;
  --mono:'Space Mono',monospace;
}
body.light{
  --bg:#f0ede8;--bg2:#e8e4de;--bg3:#ddd9d2;
  --card:rgba(255,255,255,0.85);--card2:rgba(255,255,255,0.6);
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.05);
  --txt:#0f172a;--sub:#64748b;--dim:#94a3b8;
  --inp:rgba(255,255,255,0.9);
  --shadow:0 4px 24px rgba(0,0,0,0.1),0 0 0 1px rgba(0,0,0,0.06);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--txt);
  overflow-x:hidden;
  min-height:100vh;
  transition:background 0.4s,color 0.3s;
  -webkit-font-smoothing:antialiased;
}
body.dark::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 10% 0%,rgba(59,130,246,0.12) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 100%,rgba(168,85,247,0.1) 0%,transparent 60%);
}
#root{position:relative;z-index:1}
input,button,select{font-family:var(--font)}
button{cursor:pointer;border:none;background:none;transition:all 0.18s}
button:active{transform:scale(0.96)}
input{outline:none;border:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}

/* Glass card */
.glass{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:var(--shadow);
}
.glass-sm{
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

/* Number displays */
.num{font-family:var(--mono);font-weight:700;letter-spacing:-0.02em}
.num-lg{font-size:26px;line-height:1}
.num-md{font-size:17px}
.num-sm{font-size:13px}

/* Glow text */
.glow-blue{color:var(--blue2);text-shadow:0 0 20px var(--blueglow)}
.glow-green{color:var(--green);text-shadow:0 0 16px var(--greenglow)}
.glow-red{color:var(--red);text-shadow:0 0 16px var(--redglow)}
.glow-purple{color:var(--purple);text-shadow:0 0 16px var(--purpleglow)}

/* Animated gradient button */
.btn-primary{
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:#fff;border-radius:var(--radius-sm);
  padding:14px;font-size:15px;font-weight:700;
  box-shadow:0 4px 20px var(--blueglow),0 0 0 1px rgba(255,255,255,0.1) inset;
  border:none;cursor:pointer;width:100%;
  transition:all 0.2s;font-family:var(--font);
  letter-spacing:0.01em;
}
.btn-primary:active{transform:scale(0.98);box-shadow:0 2px 12px var(--blueglow)}
.btn-primary.ok{background:linear-gradient(135deg,#06ffa5,#00d084);box-shadow:0 4px 20px var(--greenglow)}

.btn-sm{
  padding:7px 14px;border-radius:var(--radius-xs);
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all 0.15s;font-family:var(--font);
}

/* Category pill */
.cat-pill{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:11px 4px;border-radius:14px;cursor:pointer;
  border:2px solid transparent;transition:all 0.18s;
  background:var(--card2);
}
.cat-pill.active{box-shadow:0 2px 16px currentColor}

/* Stat card */
.stat-card{
  border-radius:18px;padding:18px 14px;
  display:flex;flex-direction:column;gap:5px;
  color:#fff;position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 60%);
  pointer-events:none;
}

/* Tab bar */
.tabbar{
  display:flex;align-items:center;justify-content:center;
  gap:4px;padding:6px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  box-shadow:var(--shadow);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:9px 6px;border-radius:14px;cursor:pointer;
  color:var(--sub);font-size:10px;font-weight:600;
  transition:all 0.2s;font-family:var(--font);letter-spacing:0.02em;
  text-transform:uppercase;
}
.tab-btn.active{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;box-shadow:0 4px 16px var(--blueglow)}

/* Input */
.inp-field{
  background:var(--inp);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--txt);
  padding:11px 14px;
  font-size:13px;
  font-family:var(--font);
  width:100%;
  box-sizing:border-box;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.inp-field:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blueglow)}

/* Expense row */
.exp-row{
  display:flex;align-items:center;gap:10px;
  padding:11px 13px;border-radius:var(--radius-sm);
  background:var(--card);border:1px solid var(--border);
  margin-bottom:6px;transition:all 0.15s;
  box-shadow:var(--shadow-sm);
}

/* Progress bar */
.prog-track{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;border-radius:3px;transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1)}

/* Recurring badge */
.badge{
  font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;
  font-family:var(--font);letter-spacing:0.03em;text-transform:uppercase;
}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes glow-pulse{0%,100%{box-shadow:0 4px 20px var(--blueglow)}50%{box-shadow:0 4px 36px var(--blueglow),0 0 60px var(--blueglow)}}
.fade-in{animation:fadeIn 0.28s ease both}
.pulse{animation:pulse 2s ease infinite}

/* Calendar */
.cal-day{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:34px;border-radius:9px;cursor:pointer;
  border:2px solid transparent;transition:all 0.15s;
  font-size:12px;color:var(--sub);
}
.cal-day.today{border-color:var(--blue);color:var(--blue);font-weight:700}
.cal-day.selected{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border-color:transparent;box-shadow:0 2px 12px var(--blueglow)}
.cal-day.has-data{background:var(--card2)}
.cal-day.future{opacity:0.25;cursor:default}

/* Section header */
.section-hd{font-size:13px;font-weight:700;color:var(--sub);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;margin-top:20px}

/* Edit overlay */
.edit-overlay{
  border-radius:var(--radius-sm);padding:14px;
  background:var(--bg3);border:2px solid var(--blue);
  box-shadow:0 0 0 4px var(--blueglow);
  margin-bottom:6px;
}

/* Swipe to delete */
.exp-row-wrap{position:relative;overflow:hidden;border-radius:var(--radius-sm);margin-bottom:6px}
.swipe-del-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:linear-gradient(135deg,#dc2626,#ff4466);display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:var(--radius-sm)}
.exp-row-inner{transition:transform 0.15s;touch-action:pan-y}
.exp-row-inner.swiped{transform:translateX(-80px)}

/* PIN screen */
.pin-screen{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:32px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--blue);transition:background 0.15s}
.pin-dot.filled{background:var(--blue);box-shadow:0 0 10px var(--blueglow)}
.pin-key{width:72px;height:72px;border-radius:50%;background:var(--card);border:1px solid var(--border);font-size:22px;font-weight:700;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
.pin-key:active{transform:scale(0.92);background:var(--blue);color:#fff}

/* Budget alert badge */
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--redglow);display:inline-block;margin-left:3px;vertical-align:middle;animation:pulse 2s ease infinite}

/* Annual summary card */
.annual-card{border-radius:20px;padding:18px;background:linear-gradient(135deg,#1e1b4b,#312e81);border:1px solid rgba(99,102,241,0.3);margin-bottom:16px}

/* Print styles */
@media print{
  .tabbar,.stat-card,.btn-primary,.btn-sm,button:not(.print-keep){display:none!important}
  body{background:#fff!important;color:#000!important}
  .glass{background:#fff!important;border:1px solid #ccc!important;box-shadow:none!important}
  #root{padding-bottom:0!important}
  body::before{display:none!important}
}
</style>

          <polyline points=${points.join(" ")} fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style=${{filter:"drop-shadow(0 0 4px rgba(59,130,246,0.8))"}}>
          </polyline>
          ${dayData.map(function(p,i){if(p.v===0)return null;return html`<circle key=${"td"+i} cx=${padL+i*step} cy=${padT+cH-(p.v/maxV)*cH} r="3.5" fill="#3b82f6" stroke="var(--bg)" stroke-width="2" style=${{filter:"drop-shadow(0 0 4px rgba(59,130,246,0.9))"}}/>`})}
          ${dayData.filter(function(p,i){return i===0||i===dayData.length-1||i%5===4}).map(function(p){return html`<text key=${"tx"+p.d} x=${padL+(p.d-1)*step} y=${H-4} text-anchor="middle" fill="var(--dim)" font-size="8" font-family="var(--mono)">${p.d}</text>`})}
        </svg>`;
      }()}
    </div>`}

    <!-- Monthly comparison bars -->
    <p style=${{fontSize:13,fontWeight:700,color:"var(--sub)",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:12}}>${t("monthly_comp")}</p>
    ${function(){
      var data=mComp.filter(function(m){return m.expense>0||m.income>0});
      if(data.length<2)return html`<p style=${{color:"var(--dim)",fontSize:12,textAlign:"center",padding:"16px 0"}}>${t("need_2m")}</p>`;
      var maxV=0;data.forEach(function(m){if(m.expense>maxV)maxV=m.expense;if(m.income>maxV)maxV=m.income});
      if(maxV===0)maxV=1;
      var W=332,H=170,padL=44,padR=8,padT=12,padB=32;
      var cW=W-padL-padR,cH=H-padT-padB;
      var barGap=cW/data.length,barW=Math.min(barGap*0.35,26);
      var yLabels=[0,Math.round(maxV/2),Math.round(maxV)];
      return html`<div class="glass" style=${{padding:16,marginBottom:16}}>
        <svg width="100%" viewBox=${"0 0 "+W+" "+H} style=${{overflow:"visible"}}>
          ${yLabels.map(function(val,i){var y=padT+cH-(val/maxV)*cH;return html`<g key=${"my"+i}>
            <line x1=${padL} y1=${y} x2=${W-padR} y2=${y} stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <text x=${padL-5} y=${y+3} text-anchor="end" fill="var(--dim)" font-size="8" font-family="var(--mono)">${val>=1000?(val/1000).toFixed(0)+"K":val}</text>
          </g>`})}
          ${data.map(function(m,i){var cx=padL+barGap*i+barGap/2;var hExp=(m.expense/maxV)*cH;var hInc=(m.income/maxV)*cH;return html`<g key=${"mb"+i}>
            ${m.income>0&&html`<rect x=${cx-barW-1} y=${padT+cH-hInc} width=${barW} height=${hInc} rx="4" fill="#06ffa5" opacity="0.7" style=${{filter:"drop-shadow(0 0 4px rgba(6,255,165,0.4))"}}/>`}
            <rect x=${cx+1} y=${padT+cH-hExp} width=${barW} height=${Math.max(hExp,2)} rx="4" fill="#3b82f6" style=${{filter:"drop-shadow(0 0 4px rgba(59,130,246,0.4))"}}>
            </rect>
            <text x=${cx} y=${H-16} text-anchor="middle" fill="var(--sub)" font-size="9" font-weight="700" font-family="var(--font)">${m.label}</text>
            <text x=${cx} y=${H-4} text-anchor="middle" fill="var(--dim)" font-size="7" font-family="var(--font)">${m.year}</text>
          </g>`})}
        </svg>
        <div style=${{display:"flex",gap:16,justifyContent:"center",marginTop:8}}>
          <div style=${{display:"flex",alignItems:"center",gap:5}}><div style=${{width:10,height:10,borderRadius:3,background:"var(--green)",boxShadow:"0 0 4px var(--greenglow)"}}/><span style=${{fontSize:10,color:"var(--sub)",fontWeight:600}}>${t("income_label")}</span></div>
          <div style=${{display:"flex",alignItems:"center",gap:5}}><div style=${{width:10,height:10,borderRadius:3,background:"var(--blue)",boxShadow:"0 0 4px var(--blueglow)"}}/><span style=${{fontSize:10,color:"var(--sub)",fontWeight:600}}>${t("expense_label")}</span></div>
        </div>
        <div style=${{marginTop:12,display:"flex",flexDirection:"column",gap:3}}>
          ${data.map(function(m){return html`<div key=${m.key} style=${{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
            <span class="num" style=${{fontSize:10,fontWeight:700,width:30,color:"var(--sub)"}}>${m.label}</span>
            <span class="num" style=${{fontSize:10,color:"var(--green)",width:70}}>${m.income>0?f(m.income):"ŌĆö"}</span>
            <span class="num" style=${{fontSize:10,color:"var(--red)",flex:1}}>${f(m.expense)}</span>
            ${m.savingRate!==null&&html`<span class="num" style=${{fontSize:10,fontWeight:700,color:m.savingRate>=0?"var(--green)":"var(--red)"}}>%${m.savingRate}</span>`}
          </div>`})}
        </div>
      </div>`;
    }()}

    <!-- Annual Summary -->
    ${(annualData.income>0||annualData.expense>0)&&html`<div class="annual-card" style=${{marginBottom:16}}>
      <p style=${{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.5)",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:14}}>${now.getFullYear()+" ŌĆö "+t("annual_summary")}</p>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <div><p style=${{fontSize:10,color:"rgba(255,255,255,0.5)",fontWeight:600,marginBottom:3}}>${t("annual_income")}</p><p class="num" style=${{fontSize:16,fontWeight:800,color:"#06ffa5"}}>${f(annualData.income)}</p></div>
        <div><p style=${{fontSize:10,color:"rgba(255,255,255,0.5)",fontWeight:600,marginBottom:3}}>${t("annual_expense")}</p><p class="num" style=${{fontSize:16,fontWeight:800,color:"#ff4466"}}>${f(annualData.expense)}</p></div>
        <div><p style=${{fontSize:10,color:"rgba(255,255,255,0.5)",fontWeight:600,marginBottom:3}}>${t("annual_savings")}</p><p class="num" style=${{fontSize:16,fontWeight:800,color:annualData.net>=0?"#06ffa5":"#ff4466"}}>${f(annualData.net)}</p></div>
        <div><p style=${{fontSize:10,color:"rgba(255,255,255,0.5)",fontWeight:600,marginBottom:3}}>${t("savings_rate")}</p><p class="num" style=${{fontSize:16,fontWeight:800,color:"#f59e0b"}}>${annualData.rate!==null?"%"+annualData.rate:"ŌĆö"}</p></div>
      </div>
      ${annualData.topCat&&html`<div style=${{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:"var(--radius-xs)",background:"rgba(255,255,255,0.07)"}}>
        <span style=${{fontSize:16}}>${annualData.topCat.icon}</span>
        <span style=${{fontSize:11,color:"rgba(255,255,255,0.7)",fontWeight:600}}>${t("top_cat")+": "}</span>
        <span style=${{fontSize:12,color:"#fff",fontWeight:700}}>${annualData.topCat.label}</span>
      </div>`}
    </div>`}

    <!-- Debt status -->
    <p style=${{fontSize:13,fontWeight:700,color:"var(--sub)",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:12}}>${t("debt_status")}</p>
    ${S.debts.map(function(d){var p=d.total>0?Math.min(100,(d.paid/d.total)*100):0;return html`<div key=${d.id} class="glass" style=${{padding:14,marginBottom:8}}>
      <div style=${{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style=${{fontSize:13,fontWeight:700}}>${d.icon+" "+d.label}</span><span class="num glow-green" style=${{fontSize:12,fontWeight:700}}>${p.toFixed(1)+"%"}</span></div>
      <div style=${{height:8,background:"var(--card2)",borderRadius:4,overflow:"hidden",marginBottom:8}}>
        <div style=${{height:"100%",width:p+"%",background:"linear-gradient(90deg,var(--green),#00d084)",borderRadius:4,transition:"width 0.5s",boxShadow:"0 0 8px rgba(6,255,165,0.4)"}}/>
      </div>
      <div style=${{display:"flex",justifyContent:"space-between"}}>
        <span class="num" style=${{fontSize:11,color:"var(--green)"}}>${f(d.paid)+" "+t("paid_sfx")}</span>
        <span class="num" style=${{fontSize:11,color:"var(--red)"}}>${f(Math.max(0,d.total-d.paid))+" "+t("left_sfx")}</span>
      </div>
    </div>`})}
    <div style=${{height:16}}/>
  </div>`}

  <!-- BOTTOM TAB BAR -->
  <div style=${{position:"fixed",bottom:0,left:0,right:0,padding:"12px 16px 16px",zIndex:100,background:dk?"linear-gradient(to top, rgba(7,9,15,0.98) 60%, rgba(7,9,15,0) 100%)":"linear-gradient(to top, rgba(240,237,232,0.98) 60%, rgba(240,237,232,0) 100%)"}}>
    <div class="tabbar" style=${{maxWidth:448,margin:"0 auto"}}>
      ${[{id:"harcama",lk:"tab_exp",i:"Ō£Å’ĖÅ"},{id:"borc",lk:"tab_debts",i:"­¤Æ│"},{id:"butce",lk:"tab_budget",i:"­¤ōŖ"},{id:"ozet",lk:"tab_summary",i:"­¤ōł"}].map(function(tb){var act=tab===tb.id;var showBadge=tb.id==="butce"&&budgetAlert&&!act;return html`<button key=${tb.id} onClick=${function(){setTab(tb.id)}} class=${"tab-btn"+(act?" active":"")}>
        <div style=${{position:"relative",display:"inline-flex",alignItems:"center",justifyContent:"center"}}>
          <span style=${{fontSize:18}}>${tb.i}</span>
          ${showBadge&&html`<span class="notif-dot" style=${{position:"absolute",top:-2,right:-6}}/>`}
        </div>
        <span>${t(tb.lk)}</span>
      </button>`})}
    </div>
  </div>

  </div>`;
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
